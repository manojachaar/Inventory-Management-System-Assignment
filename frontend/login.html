<!DOCTYPE html>
<html>

<head>
    <title>Inventory Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

    <h1>Inventory Login</h1>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    

</div>

<script src="login.js"></script>

</body>
</html>
